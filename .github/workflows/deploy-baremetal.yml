name: Deploy Backend (Bare-Metal)

on:
  push:
    branches:
      - master
    paths:
      - 'back/api/**'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0' # Ajusta esto si usas otra versión de Go

      - name: Build Binary
        working-directory: back/api
        run: |
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -o ermc-api main.go

      - name: Create Systemd Service File
        run: |
          cat << 'EOF' > inkomi-api.service
          [Unit]
          Description=Inkomi API Service
          After=network.target

          [Service]
          Type=simple
          User=${USER}
          WorkingDirectory=/home/${USER}/inkomi/back/api
          ExecStart=/home/${USER}/inkomi/back/api/ermc-api serve --port 8080
          Restart=on-failure
          RestartSec=5

          [Install]
          WantedBy=multi-user.target
          EOF

      - name: Copy binary and service via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_PRIVATE_KEY }}
          source: "back/api/ermc-api,inkomi-api.service"
          target: "~/inkomi"

      - name: Deploy and Restart Service via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_PRIVATE_KEY }}
          script: |
            # 1. Setup directories
            mkdir -p ~/inkomi/back/api/data
            
            # 2. Make binary executable
            chmod +x ~/inkomi/back/api/ermc-api
            
            # 3. Setup systemd service if not exists or if changed
            sed -i "s/\${USER}/$USER/g" ~/inkomi/inkomi-api.service
            sudo cp ~/inkomi/inkomi-api.service /etc/systemd/system/inkomi-api.service
            
            # 4. Reload and restart
            sudo systemctl daemon-reload
            sudo systemctl enable inkomi-api
            sudo systemctl restart inkomi-api
